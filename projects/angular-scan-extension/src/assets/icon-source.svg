<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="shieldL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3d4e"/>
      <stop offset="1" stop-color="#dd0031"/>
    </linearGradient>
    <linearGradient id="shieldR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c3002f"/>
      <stop offset="1" stop-color="#9b0125"/>
    </linearGradient>
    <radialGradient id="dotGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Angular shield (fills the canvas) -->
  <path d="M64 2 L124 21 L113 91 L64 126 L15 91 L4 21 Z" fill="url(#shieldL)"/>
  <path d="M64 2 L124 21 L113 91 L64 126 Z" fill="url(#shieldR)"/>

  <!-- render pulse (heartbeat) -->
  <polyline points="20,72 44,72 55,44 67,95 78,56 90,72 110,72"
            fill="none" stroke="#ffffff" stroke-width="8.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- scan dot at the spike -->
  <circle cx="55" cy="44" r="17" fill="url(#dotGlow)"/>
  <circle cx="55" cy="44" r="6.5" fill="#5eead4"/>
</svg>
